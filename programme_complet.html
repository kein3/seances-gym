<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Training">
<meta name="theme-color" content="#0d0d0d">
<title>Programme</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root, :root[data-theme="dark"] {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface-2: #1c1c1c;
    --border: #222;
    --text: #f0f0f0;
    --text-2: #999;
    --text-3: #555;
    --text-4: #333;
    --warn-bg: rgba(245, 168, 74, 0.08);
    --warn-border: rgba(245, 168, 74, 0.2);
    --warn-text: #f5a84a;
    --alt-bg: rgba(100, 170, 255, 0.05);
    --alt-border: rgba(100, 170, 255, 0.15);
    --alt-icon: #64aaff;
    --accent: #c03a2b;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  :root[data-theme="light"] {
    --bg: #f5f4f1;
    --surface: #ffffff;
    --surface-2: #edece7;
    --border: #d8d6cf;
    --text: #1a1a1a;
    --text-2: #55514a;
    --text-3: #8a857c;
    --text-4: #b5b0a6;
    --warn-bg: rgba(200, 110, 20, 0.08);
    --warn-border: rgba(200, 110, 20, 0.25);
    --warn-text: #a8540d;
    --alt-bg: rgba(40, 100, 180, 0.05);
    --alt-border: rgba(40, 100, 180, 0.2);
    --alt-icon: #2d6bb3;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
  }

  body {
    min-height: 100%;
    -webkit-overflow-scrolling: touch;
  }

  /* ══ TOP BAR ══ */
  .topbar {
    position: sticky;
    top: 0;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding-top: var(--safe-top);
    z-index: 10;
  }

  .topbar-row {
    height: 52px;
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
  }

  .btn-back {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--surface);
    border: none;
    color: var(--text-2);
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  body.view-session .btn-back { display: flex; }

  .topbar-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 0.5px;
    color: var(--text);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .topbar-accent {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent-color, transparent);
    flex-shrink: 0;
    display: none;
  }

  body.view-session .topbar-accent { display: block; }

  /* ══ MAIN ══ */
  main {
    padding-bottom: calc(24px + var(--safe-bottom));
    transition: padding-bottom 0.3s;
  }

  body.timer-active main {
    padding-bottom: calc(110px + var(--safe-bottom));
  }

  .view { display: none; }
  .view.active { display: block; }

  /* ══ HOME VIEW ══ */
  .home-hero {
    padding: 24px 20px 20px;
  }

  .home-version {
    text-align: center;
    padding: 32px 20px 20px;
    font-size: 11px;
    color: var(--text-4);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  .home-hero h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 56px;
    line-height: 0.9;
    letter-spacing: 0.5px;
    color: var(--text);
  }

  .home-hero h1 em {
    font-style: normal;
    color: var(--accent);
    display: block;
  }

  .home-hero p {
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-3);
    margin-top: 10px;
  }

  .home-sessions {
    padding: 12px 12px 24px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .session-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 18px 16px;
    cursor: pointer;
    transition: background 0.12s, transform 0.12s;
    position: relative;
    overflow: hidden;
  }

  .session-card:active {
    background: var(--surface-2);
    transform: scale(0.995);
  }

  .session-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent-color, var(--accent));
  }

  .session-card-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 0.5px;
    line-height: 1;
    color: var(--text);
    margin-bottom: 6px;
  }

  .session-card-meta {
    font-size: 12px;
    color: var(--text-3);
    display: flex;
    flex-wrap: wrap;
    gap: 4px 10px;
  }

  .session-card-meta span {
    white-space: nowrap;
  }

  .session-card-arrow {
    position: absolute;
    right: 18px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-4);
    font-size: 22px;
  }

  /* ══ SESSION VIEW ══ */
  .session-hero {
    padding: 20px 20px 24px;
    border-bottom: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }

  .session-hero::after {
    content: '';
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 2px;
    background: var(--accent-color);
  }

  .session-hero h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    letter-spacing: 0.5px;
    line-height: 0.95;
    color: var(--text);
  }

  .session-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 14px;
  }

  .session-pill {
    font-size: 11px;
    color: var(--text-2);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 999px;
    letter-spacing: 0.3px;
  }

  .session-pill.primary {
    color: var(--accent-color);
    border-color: color-mix(in srgb, var(--accent-color) 40%, transparent);
    background: color-mix(in srgb, var(--accent-color) 12%, transparent);
  }

  /* ══ BLOC ══ */
  .bloc {
    padding: 28px 20px 0;
  }

  .bloc-header {
    margin-bottom: 14px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }

  .bloc-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    line-height: 0.85;
    color: var(--accent-color);
    letter-spacing: 0.5px;
    flex-shrink: 0;
  }

  .bloc-title-group {
    flex: 1;
    padding-top: 4px;
    min-width: 0;
  }

  .bloc-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 0.5px;
    color: var(--text);
    line-height: 1.1;
  }

  .bloc-sub {
    font-size: 12px;
    color: var(--text-3);
    margin-top: 3px;
  }

  .bloc-duration {
    display: inline-block;
    font-size: 11px;
    color: var(--text-2);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 3px 8px;
    border-radius: 6px;
    margin-top: 6px;
    font-variant-numeric: tabular-nums;
  }

  /* ══ EXERCISE CARD ══ */
  .ex {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 10px;
    overflow: hidden;
  }

  .ex-head {
    display: flex;
    align-items: center;
    padding: 14px 16px;
    gap: 12px;
    cursor: pointer;
    user-select: none;
  }

  .ex-head:active { background: var(--surface-2); }

  .ex-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    color: var(--accent-color);
    font-weight: 400;
    min-width: 24px;
    flex-shrink: 0;
    letter-spacing: 0.5px;
  }

  .ex-head-text {
    flex: 1;
    min-width: 0;
  }

  .ex-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.25;
  }

  .ex-sub {
    font-size: 11px;
    color: var(--text-3);
    margin-top: 2px;
    line-height: 1.3;
  }

  .ex-chevron {
    color: var(--text-4);
    font-size: 14px;
    transition: transform 0.2s;
    flex-shrink: 0;
  }

  .ex.open .ex-chevron { transform: rotate(90deg); }

  /* Stats — always visible. Flex-based so the last row always fills the width */
  .ex-stats {
    display: flex;
    flex-wrap: wrap;
    gap: 1px;
    background: var(--border);
    border-top: 1px solid var(--border);
  }

  .stat {
    background: var(--surface);
    padding: 10px 8px 11px;
    text-align: center;
    flex: 1 1 0;
    min-width: 0;
  }

  /* 5 stats: 3 on top row, 2 on bottom. Force 33% on top 3, 50% on bottom 2 */
  .ex-stats.cols-5 .stat { flex-basis: calc(33.333% - 1px); }
  .ex-stats.cols-5 .stat:nth-child(n+4) { flex-basis: calc(50% - 1px); }

  /* 6 stats: 3+3 */
  .ex-stats.cols-6 .stat { flex-basis: calc(33.333% - 1px); }

  /* 4 stats: 2+2 on narrow screens, 4 on wider */
  .ex-stats.cols-4 .stat { flex-basis: calc(25% - 1px); }

  /* 3 stats: 3 columns */
  .ex-stats.cols-3 .stat { flex-basis: calc(33.333% - 1px); }

  /* 2 stats: half-half */
  .ex-stats.cols-2 .stat { flex-basis: calc(50% - 1px); }

  /* 1 stat: full width */
  .ex-stats.cols-1 .stat { flex-basis: 100%; }

  @media (max-width: 400px) {
    .ex-stats.cols-4 .stat { flex-basis: calc(50% - 1px); }
    .ex-stats.cols-5 .stat { flex-basis: calc(33.333% - 1px); }
    .ex-stats.cols-5 .stat:nth-child(n+4) { flex-basis: calc(50% - 1px); }
  }

  .stat-label {
    font-size: 9px;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text-3);
    margin-bottom: 2px;
  }

  .stat-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    line-height: 1;
    color: var(--text);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.3px;
  }

  .stat.rest .stat-value { color: var(--accent-color); }

  /* Details — collapsible */
  .ex-details {
    display: none;
    padding: 14px 16px 16px;
    border-top: 1px solid var(--border);
    background: var(--surface-2);
  }

  .ex.open .ex-details { display: block; }

  .detail-label {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-3);
    font-weight: 600;
    margin-bottom: 4px;
  }

  .detail-text {
    font-size: 13px;
    color: var(--text-2);
    line-height: 1.55;
  }

  .detail-block + .detail-block {
    margin-top: 14px;
  }

  .detail-warn {
    display: flex;
    gap: 8px;
    font-size: 12.5px;
    color: var(--warn-text);
    line-height: 1.5;
    padding: 10px 12px;
    background: var(--warn-bg);
    border: 1px solid var(--warn-border);
    border-radius: 8px;
    margin-top: 12px;
  }

  .detail-warn::before {
    content: '⚠';
    flex-shrink: 0;
  }

  .detail-alt {
    display: flex;
    gap: 8px;
    font-size: 12.5px;
    color: var(--text-2);
    line-height: 1.5;
    padding: 10px 12px;
    background: var(--alt-bg);
    border: 1px solid var(--alt-border);
    border-radius: 8px;
    margin-top: 12px;
  }

  .detail-alt::before {
    content: '↻';
    flex-shrink: 0;
    color: var(--alt-icon);
    font-size: 14px;
  }

  .detail-alt strong {
    color: var(--text);
    font-weight: 600;
    display: block;
    margin-bottom: 2px;
  }

  /* ══ SUPERSET ══ */
  .superset {
    margin-bottom: 10px;
    background: var(--surface);
    border: 1px solid var(--accent-color);
    border-radius: 12px;
    overflow: hidden;
  }

  .superset-banner {
    padding: 8px 16px;
    background: var(--accent-color);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-align: center;
  }

  .superset .ex {
    border: none;
    border-radius: 0;
    margin-bottom: 0;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .superset .ex:last-of-type {
    border-bottom: none;
  }

  .superset-footer {
    padding: 10px 16px;
    font-size: 12px;
    color: var(--text-2);
    border-top: 1px solid var(--border);
    background: var(--surface-2);
    text-align: center;
  }

  /* ══ HYROX SPECIFIC ══ */
  .hyrox-round {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 10px;
    display: grid;
    grid-template-columns: 36px 1fr;
    gap: 12px;
  }

  .round-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--accent-color);
    line-height: 1;
    align-self: start;
  }

  .round-body {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .round-part {
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }

  .round-part-icon {
    font-size: 18px;
    flex-shrink: 0;
    line-height: 1;
    margin-top: 2px;
  }

  .round-part-info { flex: 1; min-width: 0; }

  .round-part-label {
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-3);
    font-weight: 600;
  }

  .round-part-val {
    font-size: 14px;
    color: var(--text);
    font-weight: 500;
    margin-top: 1px;
  }

  .round-part-sub {
    font-size: 12px;
    color: var(--text-3);
    margin-top: 3px;
    line-height: 1.4;
  }

  .hyrox-note {
    font-size: 12px;
    color: var(--text-3);
    line-height: 1.5;
    padding: 12px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin: 8px 0 12px;
  }

  .amrap-item {
    display: grid;
    grid-template-columns: 32px 1fr;
    gap: 10px;
    padding: 12px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 8px;
  }

  .amrap-item + .amrap-item { margin-top: 0; }

  .amrap-icon {
    font-size: 18px;
    line-height: 1.1;
  }

  .amrap-label {
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-3);
    font-weight: 600;
  }

  .amrap-val {
    font-size: 14px;
    color: var(--text);
    font-weight: 500;
    margin-top: 1px;
  }

  .amrap-sub {
    font-size: 12px;
    color: var(--text-3);
    margin-top: 2px;
  }

  .amrap-note {
    font-size: 13px;
    color: var(--accent-color);
    font-weight: 500;
    margin-top: 8px;
    padding: 10px 12px;
    background: color-mix(in srgb, var(--accent-color) 8%, transparent);
    border-radius: 8px;
    text-align: center;
  }

  /* ══ THEME TOGGLE ══ */
  .btn-theme {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--surface);
    border: none;
    color: var(--text-2);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  .btn-theme:active { background: var(--surface-2); }

  /* ══ BLOC NAV (sticky below topbar) ══ */
  .bloc-nav {
    position: sticky;
    top: calc(52px + var(--safe-top));
    z-index: 5;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 8px 12px;
    display: flex;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }

  .bloc-nav::-webkit-scrollbar { display: none; }

  .bloc-nav-btn {
    flex-shrink: 0;
    min-width: 44px;
    height: 40px;
    padding: 0 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text-2);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 0.5px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }

  .bloc-nav-btn .num {
    color: var(--accent-color);
    font-size: 18px;
  }

  .bloc-nav-btn.active {
    background: var(--accent-color);
    border-color: var(--accent-color);
    color: #fff;
  }

  .bloc-nav-btn.active .num {
    color: #fff;
  }

  .bloc {
    scroll-margin-top: calc(52px + 56px + var(--safe-top));
  }

  /* ══ NOTES ══ */
  .ex-note-indicator {
    display: none;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent-color);
    flex-shrink: 0;
    margin-right: 2px;
  }

  .ex.has-note .ex-note-indicator { display: block; }

  .ex-note {
    border-top: 1px solid var(--border);
    background: var(--surface-2);
    padding: 12px 16px;
  }

  .ex-note-label {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-3);
    font-weight: 600;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .ex-note-clear {
    background: none;
    border: none;
    color: var(--text-3);
    font-size: 11px;
    cursor: pointer;
    letter-spacing: 0;
    text-transform: none;
    font-weight: 400;
  }

  .ex-note-clear:active { color: var(--text); }

  .ex-note textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    line-height: 1.5;
    padding: 10px 12px;
    resize: vertical;
    min-height: 60px;
    outline: none;
    -webkit-appearance: none;
  }

  .ex-note textarea:focus {
    border-color: var(--accent-color);
  }

  /* ══ REST TIMER BUTTON (inline in stats row) ══ */
  .stat.rest {
    cursor: pointer;
    position: relative;
    transition: background 0.12s;
  }

  .stat.rest:active { background: var(--surface-2); }

  .stat.rest::after {
    content: '▶';
    position: absolute;
    top: 4px;
    right: 6px;
    font-size: 8px;
    color: var(--accent-color);
    opacity: 0.6;
  }

  /* ══ CHARGE TRACKER ══ */
  .ex-charge {
    border-top: 1px solid var(--border);
    background: var(--surface-2);
    padding: 12px 16px;
  }

  .ex-charge-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .ex-charge-label {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-3);
    font-weight: 600;
    flex-shrink: 0;
  }

  .ex-charge-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 0.5px;
    padding: 6px 12px;
    outline: none;
    -webkit-appearance: none;
    text-align: center;
    min-width: 0;
  }

  .ex-charge-input:focus { border-color: var(--accent-color); }

  .ex-charge-input::placeholder {
    color: var(--text-4);
    font-family: inherit;
  }

  .ex-charge-save {
    background: var(--accent-color);
    border: none;
    border-radius: 8px;
    color: #fff;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    padding: 8px 14px;
    text-transform: uppercase;
    cursor: pointer;
    flex-shrink: 0;
  }

  .ex-charge-save:active { opacity: 0.7; }

  .ex-charge-save.saved {
    background: var(--surface);
    color: var(--text-3);
    border: 1px solid var(--border);
  }

  .ex-charge-history {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }

  .ex-charge-history:empty { display: none; }

  .history-chip {
    font-size: 11px;
    color: var(--text-3);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 3px 8px;
    border-radius: 6px;
    font-variant-numeric: tabular-nums;
    cursor: pointer;
    transition: border-color 0.12s, background 0.12s;
    user-select: none;
    -webkit-user-select: none;
    position: relative;
  }

  .history-chip:active {
    background: var(--surface-2);
  }

  .history-chip.editing {
    border-color: var(--accent-color);
    background: color-mix(in srgb, var(--accent-color) 10%, var(--surface));
  }

  .history-chip.deleting {
    border-color: #d9534f;
    background: color-mix(in srgb, #d9534f 15%, var(--surface));
    color: #d9534f;
  }

  .history-chip.deleting strong { color: #d9534f; }

  .history-chip strong {
    color: var(--text-2);
    font-weight: 600;
  }

  /* ══ EDIT DIALOG for charge history ══ */
  .edit-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    display: none;
    align-items: flex-end;
    justify-content: center;
    padding: 20px;
    padding-bottom: calc(20px + var(--safe-bottom));
  }

  .edit-backdrop.active { display: flex; }

  .edit-panel {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    width: 100%;
    max-width: 380px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .edit-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    color: var(--text);
    letter-spacing: 0.5px;
  }

  .edit-sub {
    font-size: 12px;
    color: var(--text-3);
    margin-top: -10px;
  }

  .edit-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 0.5px;
    padding: 12px 16px;
    outline: none;
    -webkit-appearance: none;
    text-align: center;
  }

  .edit-input:focus { border-color: var(--accent-color); }

  .edit-actions {
    display: flex;
    gap: 8px;
    margin-top: 4px;
  }

  .edit-btn {
    flex: 1;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    padding: 12px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    -webkit-appearance: none;
    font-family: inherit;
  }

  .edit-btn.primary {
    background: var(--accent-color);
    color: #fff;
    border-color: var(--accent-color);
  }

  .edit-btn.danger {
    color: #d9534f;
    border-color: color-mix(in srgb, #d9534f 40%, var(--border));
  }

  .edit-btn:active { opacity: 0.7; }

  .history-chip.latest strong {
    color: var(--accent-color);
  }

  /* ══ TIMER OVERLAY ══ */
  .timer-overlay {
    position: fixed;
    bottom: calc(16px + var(--safe-bottom));
    left: 50%;
    transform: translateX(-50%) translateY(120%);
    transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.3, 1);
    z-index: 50;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    min-width: 260px;
    max-width: calc(100% - 24px);
  }

  .timer-overlay.active {
    transform: translateX(-50%) translateY(0);
  }

  .timer-overlay.ending {
    animation: pulseBg 0.6s ease-in-out infinite alternate;
  }

  @keyframes pulseBg {
    from { box-shadow: 0 10px 40px rgba(0,0,0,0.4); }
    to { box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent-color) 40%, transparent), 0 10px 40px rgba(0,0,0,0.4); }
  }

  .timer-overlay.done .timer-value {
    color: var(--accent-color);
  }

  .timer-info {
    flex: 1;
    min-width: 0;
  }

  .timer-label {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-3);
    font-weight: 600;
    line-height: 1;
    margin-bottom: 4px;
  }

  .timer-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    line-height: 0.9;
    color: var(--text);
    font-variant-numeric: tabular-nums;
    letter-spacing: 1px;
  }

  .timer-close {
    background: var(--surface-2);
    border: none;
    color: var(--text-2);
    font-size: 16px;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    cursor: pointer;
    flex-shrink: 0;
  }

  .timer-close:active { background: var(--border); }

  .timer-extend {
    background: var(--accent-color);
    border: none;
    color: #fff;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    padding: 8px 12px;
    border-radius: 8px;
    cursor: pointer;
    flex-shrink: 0;
  }

  .timer-extend:active { opacity: 0.75; }

  /* ══ Responsive tweaks ══ */
  @media (min-width: 600px) {
    .home-hero h1 { font-size: 72px; }
    .session-hero h1 { font-size: 56px; }
    main { max-width: 720px; margin: 0 auto; }
  }
</style>
</head>

<script>
const PAYLOAD = JSON.parse(document.getElementById('payload').textContent);
const { order, meta, sessions } = PAYLOAD;

// ═══ RENDER HOME ═══
function renderHome() {
  const container = document.getElementById('home-sessions');
  container.innerHTML = order.map(key => {
    const s = sessions[key];
    const m = meta[key];
    // Count exercises for meta
    let exCount = 0;
    s.blocs.forEach(b => {
      exCount += (b.exercises || []).length;
      (b.supersets || []).forEach(ss => exCount += ss.exercises.length);
      if (b.rounds) exCount += b.rounds.length;
      if (b.amrap) exCount += (b.amrap.movements || []).length;
    });
    const blocCount = s.blocs.length;
    return `
      <div class="session-card" data-session="${key}" style="--accent-color:${m.accent}">
        <div class="session-card-name">${escape(s.title)}</div>
        <div class="session-card-meta">
          <span>⏱ 60 min</span>
          <span>· ${blocCount} blocs</span>
          <span>· ${exCount} exercices</span>
        </div>
        <span class="session-card-arrow">›</span>
      </div>
    `;
  }).join('');

  container.querySelectorAll('.session-card').forEach(c => {
    c.addEventListener('click', () => openSession(c.dataset.session));
  });
}

// ═══ RENDER SESSION ═══
let currentSessionKey = null;

function openSession(key) {
  currentSessionKey = key;
  const s = sessions[key];
  const m = meta[key];
  document.body.classList.remove('view-home');
  document.body.classList.add('view-session');
  document.body.style.setProperty('--accent-color', m.accent);
  document.getElementById('topbar-accent').style.background = m.accent;
  document.getElementById('topbar-title').textContent = s.title;
  document.getElementById('view-home').classList.remove('active');
  document.getElementById('view-session').classList.add('active');

  const pills = (s.pills || []).map((p, i) => 
    `<span class="session-pill${i === 0 ? ' primary' : ''}">${escape(p)}</span>`
  ).join('');

  // Bloc nav buttons
  const blocNav = s.blocs.map((b, idx) => {
    const num = String(idx + 1).padStart(2, '0');
    const name = b.name || '';
    return `<button class="bloc-nav-btn" data-bloc="${idx}"><span class="num">${num}</span>${name ? escape(name) : ''}</button>`;
  }).join('');

  const blocs = s.blocs.map((b, idx) => renderBloc(b, idx + 1, m.accent, key)).join('');

  document.getElementById('session-content').innerHTML = `
    <div class="session-hero" style="--accent-color:${m.accent}">
      <h1>${escape(s.title)}</h1>
      <div class="session-pills">${pills}</div>
    </div>
    <nav class="bloc-nav" id="bloc-nav">${blocNav}</nav>
    <div id="bloc-list">${blocs}</div>
  `;

  // Bind exercise toggles
  document.querySelectorAll('.ex-head').forEach(h => {
    h.addEventListener('click', (e) => {
      // don't toggle if clicking inside textarea or clear button
      if (e.target.tagName === 'TEXTAREA' || e.target.classList.contains('ex-note-clear')) return;
      h.closest('.ex').classList.toggle('open');
    });
  });

  // Bind bloc nav
  document.querySelectorAll('.bloc-nav-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.dataset.bloc);
      const target = document.getElementById(`bloc-${idx}`);
      if (target) {
        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    });
  });

  // Bind notes
  bindNotes();
  restoreNotes();
  bindCharges();
  restoreCharges();
  bindRestTimers();
  trackBlocScroll();

  // Scroll to top
  window.scrollTo(0, 0);
}

// Track which bloc is currently visible
let _blocScrollHandler = null;

function trackBlocScroll() {
  const blocs = document.querySelectorAll('.bloc');
  const navBtns = document.querySelectorAll('.bloc-nav-btn');
  const navEl = document.getElementById('bloc-nav');
  let ticking = false;
  let lastActiveIdx = -1;

  const update = () => {
    ticking = false;
    if (!navEl) return;
    const navBottom = navEl.getBoundingClientRect().bottom;
    let activeIdx = 0;
    blocs.forEach((b, i) => {
      const rect = b.getBoundingClientRect();
      if (rect.top <= navBottom + 40) activeIdx = i;
    });

    if (activeIdx !== lastActiveIdx) {
      navBtns.forEach((btn, i) => {
        btn.classList.toggle('active', i === activeIdx);
      });
      lastActiveIdx = activeIdx;

      const activeBtn = navBtns[activeIdx];
      if (activeBtn && navEl) {
        const btnRect = activeBtn.getBoundingClientRect();
        const navRect = navEl.getBoundingClientRect();
        if (btnRect.left < navRect.left + 10 || btnRect.right > navRect.right - 10) {
          const targetLeft = activeBtn.offsetLeft - navEl.clientWidth / 2 + activeBtn.offsetWidth / 2;
          navEl.scrollTo({ left: targetLeft, behavior: 'smooth' });
        }
      }
    }
  };

  const onScroll = () => {
    if (!ticking) {
      ticking = true;
      requestAnimationFrame(update);
    }
  };

  // Properly remove previous listener
  if (_blocScrollHandler) {
    window.removeEventListener('scroll', _blocScrollHandler);
  }
  _blocScrollHandler = onScroll;
  window.addEventListener('scroll', onScroll, { passive: true });
  lastActiveIdx = -1;
  update();
}

function renderBloc(b, num, accent, sessionKey) {
  const blocIdx = num - 1;
  const chip = b.chip || `Bloc 0${num}`;
  const name = b.name || '';
  const sub = b.sub || '';
  const dur = b.duration || '';

  let body = '';

  // Regular exercises
  (b.exercises || []).forEach((ex, i) => {
    body += renderEx(ex, i + 1, false, sessionKey, blocIdx, i);
  });

  // Supersets
  (b.supersets || []).forEach((ss, idx) => {
    const exHtml = ss.exercises.map((ex, i) => 
      renderEx(ex, String.fromCharCode(65 + i), true, sessionKey, blocIdx, `ss${idx}-${i}`)
    ).join('');
    const rest = ss.rest ? `<div class="superset-footer">${escape(ss.rest)}</div>` : '';
    body += `
      <div class="superset">
        <div class="superset-banner">⚡ Superset</div>
        ${exHtml}
        ${rest}
      </div>
    `;
  });

  // Hyrox rounds
  if (b.rounds && b.rounds.length) {
    if (b.sim_title) {
      body += `<div class="hyrox-note">${escape(b.sim_title)}</div>`;
    }
    b.rounds.forEach(r => {
      body += `
        <div class="hyrox-round">
          <div class="round-num">${escape(r.num)}</div>
          <div class="round-body">
            ${r.run_val ? `
              <div class="round-part">
                <span class="round-part-icon">${r.run_icon || '🏃'}</span>
                <div class="round-part-info">
                  <div class="round-part-label">${escape(r.run_label || 'Course')}</div>
                  <div class="round-part-val">${escape(r.run_val)}</div>
                </div>
              </div>
            ` : ''}
            ${r.st_label ? `
              <div class="round-part">
                <span class="round-part-icon">${r.st_icon || '💪'}</span>
                <div class="round-part-info">
                  <div class="round-part-label">${escape(r.st_label)}</div>
                  <div class="round-part-val">${escape(r.st_val)}</div>
                  ${r.st_sub ? `<div class="round-part-sub">${escape(r.st_sub)}</div>` : ''}
                </div>
              </div>
            ` : ''}
          </div>
        </div>
      `;
    });
    if (b.sim_footer) {
      body += `<div class="hyrox-note">${escape(b.sim_footer)}</div>`;
    }
  }

  // AMRAP
  if (b.amrap) {
    if (b.amrap.header) {
      body += `<div class="hyrox-note">${escape(b.amrap.header)}</div>`;
    }
    (b.amrap.movements || []).forEach(mv => {
      body += `
        <div class="amrap-item">
          <div class="amrap-icon">${mv.icon || '•'}</div>
          <div>
            <div class="amrap-label">${escape(mv.label)}</div>
            <div class="amrap-val">${escape(mv.val)}</div>
            ${mv.sub ? `<div class="amrap-sub">${escape(mv.sub)}</div>` : ''}
          </div>
        </div>
      `;
    });
    if (b.amrap.footer) {
      body += `<div class="amrap-note">${escape(b.amrap.footer)}</div>`;
    }
  }

  return `
    <section class="bloc" id="bloc-${blocIdx}">
      <div class="bloc-header">
        <div class="bloc-num">0${num}</div>
        <div class="bloc-title-group">
          <div class="bloc-name">${escape(name)}</div>
          ${sub ? `<div class="bloc-sub">${escape(sub)}</div>` : ''}
          ${dur ? `<div class="bloc-duration">${escape(dur)}</div>` : ''}
        </div>
      </div>
      ${body}
    </section>
  `;
}

function renderEx(ex, num, inSuperset, sessionKey, blocIdx, exIdx) {
  const stats = ex.stats || {};
  const statsOrder = ['Séries', 'Reps', 'Charge', 'Tempo', 'Amplitude', 'Taps', 'Pause', 'Repos'];
  const sortedKeys = Object.keys(stats).sort((a, b) => {
    const ai = statsOrder.indexOf(a);
    const bi = statsOrder.indexOf(b);
    return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
  });

  // Parse rest duration (seconds) from "2 min", "90 sec", "2'30", "3 min" etc.
  function parseRestSeconds(restStr) {
    if (!restStr) return 0;
    const s = String(restStr).toLowerCase();
    // Try "X'YY" (e.g. 2'30)
    let m = s.match(/(\d+)\s*['′]\s*(\d+)/);
    if (m) return parseInt(m[1]) * 60 + parseInt(m[2]);
    // "X min YY sec"
    m = s.match(/(\d+)\s*min\s*(\d+)\s*sec/);
    if (m) return parseInt(m[1]) * 60 + parseInt(m[2]);
    // Range first: "45-60 sec" or "60–75 sec" → take lower bound
    m = s.match(/(\d+)\s*[\-–]\s*\d+\s*sec/);
    if (m) return parseInt(m[1]);
    m = s.match(/(\d+)\s*[\-–]\s*\d+\s*min/);
    if (m) return parseInt(m[1]) * 60;
    // "X min"
    m = s.match(/(\d+(?:[.,]\d+)?)\s*min/);
    if (m) {
      const v = parseFloat(m[1].replace(',', '.'));
      return Math.round(v * 60);
    }
    // "XX sec"
    m = s.match(/(\d+)\s*sec/);
    if (m) return parseInt(m[1]);
    // First number fallback, assume minutes if < 20
    m = s.match(/(\d+)/);
    if (m) {
      const n = parseInt(m[1]);
      return n < 20 ? n * 60 : n;
    }
    return 0;
  }

  const statsHtml = sortedKeys.map(k => {
    const isRest = k === 'Repos';
    const val = String(stats[k]).replace(/Poidsde corps/i, 'Poids corps');
    const restAttr = isRest ? ` data-rest-seconds="${parseRestSeconds(val)}" data-rest-label="${escape(ex.name)}"` : '';
    return `
      <div class="stat${isRest ? ' rest' : ''}"${restAttr}>
        <div class="stat-label">${escape(k)}</div>
        <div class="stat-value">${escape(val)}</div>
      </div>
    `;
  }).join('');

  let details = '';
  if (ex.execution) {
    details += `<div class="detail-block"><div class="detail-label">Exécution</div><div class="detail-text">${escape(ex.execution)}</div></div>`;
  }
  if (ex.avoid) {
    details += `<div class="detail-warn">${escape(ex.avoid)}</div>`;
  }
  if (ex.alt) {
    details += `<div class="detail-alt"><div><strong>${escape(ex.alt.label)}</strong>${escape(ex.alt.text)}</div></div>`;
  }

  const noteKey = `note:${sessionKey}:${blocIdx}:${exIdx}`;
  const chargeKey = `charge:${sessionKey}:${blocIdx}:${exIdx}`;
  const chargeHistKey = `chargeHist:${sessionKey}:${blocIdx}:${exIdx}`;

  // Only show charge tracker if the exercise has a "Charge" stat (skip pure bodyweight)
  const hasCharge = stats['Charge'] && !/poids.{0,5}corps/i.test(stats['Charge']);

  const chargeBlock = hasCharge ? `
    <div class="ex-charge">
      <div class="ex-charge-row">
        <div class="ex-charge-label">Charge</div>
        <input type="text" inputmode="decimal" class="ex-charge-input" placeholder="${escape(stats['Charge'])}" data-charge="${chargeKey}" data-hist="${chargeHistKey}">
        <button class="ex-charge-save" data-charge-save="${chargeKey}" data-hist="${chargeHistKey}">Valider</button>
      </div>
      <div class="ex-charge-history" data-charge-hist-display="${chargeHistKey}"></div>
    </div>
  ` : '';

  return `
    <div class="ex" data-note-key="${noteKey}">
      <div class="ex-head">
        <div class="ex-num">${escape(String(num))}</div>
        <div class="ex-head-text">
          <div class="ex-name">${escape(ex.name)}</div>
          ${ex.sub ? `<div class="ex-sub">${escape(ex.sub)}</div>` : ''}
        </div>
        <div class="ex-note-indicator"></div>
        <div class="ex-chevron">›</div>
      </div>
      <div class="ex-stats cols-${sortedKeys.length}">${statsHtml}</div>
      ${details ? `<div class="ex-details">${details}</div>` : ''}
      ${chargeBlock}
      <div class="ex-note">
        <div class="ex-note-label">
          <span>Ma note</span>
          <button class="ex-note-clear" data-clear="${noteKey}">Effacer</button>
        </div>
        <textarea placeholder="Sensations, ressenti, \u00e0 retenir\u2026" data-note="${noteKey}"></textarea>
      </div>
    </div>
  `;
}

// ═══ NOTES ═══
function bindNotes() {
  document.querySelectorAll('textarea[data-note]').forEach(ta => {
    ta.addEventListener('input', () => {
      const key = ta.dataset.note;
      const ex = ta.closest('.ex');
      if (ta.value.trim()) {
        try { localStorage.setItem(key, ta.value); } catch(e) {}
        ex.classList.add('has-note');
      } else {
        try { localStorage.removeItem(key); } catch(e) {}
        ex.classList.remove('has-note');
      }
    });
    // prevent taps in textarea from toggling the ex
    ta.addEventListener('click', e => e.stopPropagation());
  });

  document.querySelectorAll('.ex-note-clear').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const key = btn.dataset.clear;
      const ta = document.querySelector(`textarea[data-note="${key}"]`);
      if (ta) {
        ta.value = '';
        try { localStorage.removeItem(key); } catch(e) {}
        ta.closest('.ex').classList.remove('has-note');
      }
    });
  });
}

function restoreNotes() {
  document.querySelectorAll('textarea[data-note]').forEach(ta => {
    try {
      const v = localStorage.getItem(ta.dataset.note);
      if (v) {
        ta.value = v;
        ta.closest('.ex').classList.add('has-note');
      }
    } catch(e) {}
  });
}

// ═══ CHARGE TRACKER ═══
function formatDate(d) {
  const now = new Date();
  const then = new Date(d);
  if (isNaN(then.getTime())) return '';
  const days = Math.max(0, Math.floor((now - then) / (1000 * 60 * 60 * 24)));
  if (days === 0) return "aujourd'hui";
  if (days === 1) return 'hier';
  if (days < 7) return `il y a ${days}j`;
  if (days < 30) return `il y a ${Math.floor(days / 7)}sem`;
  return then.toLocaleDateString('fr-FR', { day: 'numeric', month: 'short' });
}

function renderChargeHistory(histKey) {
  const displayEl = document.querySelector(`[data-charge-hist-display="${histKey}"]`);
  if (!displayEl) return;
  let hist = [];
  try { hist = JSON.parse(localStorage.getItem(histKey) || '[]'); } catch(e) {}
  if (!hist.length) {
    displayEl.innerHTML = '';
    return;
  }
  // Show up to 3 most recent; reversed means index 0 in display = last item in hist
  const total = hist.length;
  const recent = hist.slice(-3).reverse();
  displayEl.innerHTML = recent.map((h, i) => {
    const realIdx = total - 1 - i;
    return `<span class="history-chip" data-hist-key="${histKey}" data-idx="${realIdx}"${i === 0 ? ' data-latest="1"' : ''}><strong>${escape(h.v)}</strong> · ${escape(formatDate(h.d))}</span>`;
  }).join('');

  // Apply latest style via JS since we need to know both state+role
  displayEl.querySelectorAll('.history-chip').forEach(chip => {
    if (chip.dataset.latest === '1') {
      chip.classList.add('latest');
    }
  });

  // Bind click to edit
  displayEl.querySelectorAll('.history-chip').forEach(chip => {
    chip.addEventListener('click', e => {
      e.stopPropagation();
      openChargeEdit(chip.dataset.histKey, parseInt(chip.dataset.idx));
    });
  });
}

function bindCharges() {
  document.querySelectorAll('[data-charge-save]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const key = btn.dataset.chargeSave;
      const histKey = btn.dataset.hist;
      const input = document.querySelector(`[data-charge="${key}"]`);
      if (!input) return;
      const val = input.value.trim();
      if (!val) return;

      // Save current value
      try { localStorage.setItem(key, val); } catch(e) {}

      // Append to history — avoid duplicate if same value & same day
      let hist = [];
      try { hist = JSON.parse(localStorage.getItem(histKey) || '[]'); } catch(e) {}
      const today = new Date().toISOString().slice(0, 10);
      const lastEntry = hist[hist.length - 1];
      if (!lastEntry || lastEntry.v !== val || lastEntry.d.slice(0, 10) !== today) {
        hist.push({ v: val, d: new Date().toISOString() });
        // Keep last 20
        if (hist.length > 20) hist = hist.slice(-20);
        try { localStorage.setItem(histKey, JSON.stringify(hist)); } catch(e) {}
      }

      // Visual feedback
      btn.classList.add('saved');
      btn.textContent = 'Enregistré';
      setTimeout(() => {
        btn.classList.remove('saved');
        btn.textContent = 'Valider';
      }, 1500);

      renderChargeHistory(histKey);
    });
  });

  // Prevent taps inside input from collapsing the exercise
  document.querySelectorAll('.ex-charge-input').forEach(input => {
    input.addEventListener('click', e => e.stopPropagation());
  });
}

function restoreCharges() {
  document.querySelectorAll('[data-charge]').forEach(input => {
    try {
      const v = localStorage.getItem(input.dataset.charge);
      if (v) input.value = v;
    } catch(e) {}
    renderChargeHistory(input.dataset.hist);
  });
}

// ═══ CHARGE EDIT MODAL ═══
const editBackdrop = document.getElementById('edit-backdrop');
const editInput = document.getElementById('edit-input');
const editSub = document.getElementById('edit-sub');
const editSave = document.getElementById('edit-save');
const editCancel = document.getElementById('edit-cancel');
const editDelete = document.getElementById('edit-delete');
let currentEdit = null; // { histKey, idx }

function openChargeEdit(histKey, idx) {
  let hist = [];
  try { hist = JSON.parse(localStorage.getItem(histKey) || '[]'); } catch(e) {}
  if (!hist[idx]) return;
  const entry = hist[idx];
  currentEdit = { histKey, idx };
  editInput.value = entry.v;
  editSub.textContent = formatDate(entry.d);
  editBackdrop.classList.add('active');
  // focus after transition
  setTimeout(() => editInput.focus(), 50);
}

function closeChargeEdit() {
  editBackdrop.classList.remove('active');
  currentEdit = null;
  editInput.blur();
}

editSave.addEventListener('click', () => {
  if (!currentEdit) return;
  const newVal = editInput.value.trim();
  if (!newVal) return;
  const { histKey, idx } = currentEdit;
  let hist = [];
  try { hist = JSON.parse(localStorage.getItem(histKey) || '[]'); } catch(e) {}
  if (hist[idx]) {
    hist[idx].v = newVal;
    try { localStorage.setItem(histKey, JSON.stringify(hist)); } catch(e) {}
    // If editing the most recent entry, also update the current-charge storage
    if (idx === hist.length - 1) {
      const chargeKey = histKey.replace('chargeHist:', 'charge:');
      try { localStorage.setItem(chargeKey, newVal); } catch(e) {}
      const input = document.querySelector(`[data-charge="${chargeKey}"]`);
      if (input) input.value = newVal;
    }
    renderChargeHistory(histKey);
  }
  closeChargeEdit();
});

editDelete.addEventListener('click', () => {
  if (!currentEdit) return;
  const { histKey, idx } = currentEdit;
  let hist = [];
  try { hist = JSON.parse(localStorage.getItem(histKey) || '[]'); } catch(e) {}
  if (hist[idx] !== undefined) {
    const wasLatest = idx === hist.length - 1;
    hist.splice(idx, 1);
    try {
      if (hist.length) {
        localStorage.setItem(histKey, JSON.stringify(hist));
      } else {
        localStorage.removeItem(histKey);
      }
    } catch(e) {}
    // If we deleted the latest, sync the current-charge value with the new latest (or clear)
    if (wasLatest) {
      const chargeKey = histKey.replace('chargeHist:', 'charge:');
      const input = document.querySelector(`[data-charge="${chargeKey}"]`);
      if (hist.length) {
        const newLatest = hist[hist.length - 1].v;
        try { localStorage.setItem(chargeKey, newLatest); } catch(e) {}
        if (input) input.value = newLatest;
      } else {
        try { localStorage.removeItem(chargeKey); } catch(e) {}
        if (input) input.value = '';
      }
    }
    renderChargeHistory(histKey);
  }
  closeChargeEdit();
});

editCancel.addEventListener('click', closeChargeEdit);

editBackdrop.addEventListener('click', e => {
  if (e.target === editBackdrop) closeChargeEdit();
});

editInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); editSave.click(); }
  if (e.key === 'Escape') closeChargeEdit();
});

// ═══ REST TIMER ═══
let timerInterval = null;
let timerEndTime = 0;
let timerTotalSeconds = 0;
const timerOverlay = document.getElementById('timer-overlay');
const timerLabel = document.getElementById('timer-label');
const timerValue = document.getElementById('timer-value');
const timerExtend = document.getElementById('timer-extend');
const timerClose = document.getElementById('timer-close');

function formatMS(totalSec) {
  if (totalSec < 0) totalSec = 0;
  const m = Math.floor(totalSec / 60);
  const s = totalSec % 60;
  return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
}

function bindRestTimers() {
  document.querySelectorAll('.stat.rest').forEach(stat => {
    stat.addEventListener('click', e => {
      e.stopPropagation();
      const seconds = parseInt(stat.dataset.restSeconds || '0');
      const label = stat.dataset.restLabel || 'Repos';
      if (seconds > 0) startRestTimer(seconds, label);
    });
  });
}

function startRestTimer(seconds, label) {
  if (timerInterval) clearInterval(timerInterval);
  timerOverlay.classList.remove('done', 'ending');
  timerOverlay.classList.add('active');
  document.body.classList.add('timer-active');
  timerLabel.textContent = label.length > 28 ? label.slice(0, 26) + '…' : label;
  timerTotalSeconds = seconds;
  timerEndTime = Date.now() + seconds * 1000;
  updateTimerDisplay();

  timerInterval = setInterval(() => {
    const remaining = Math.ceil((timerEndTime - Date.now()) / 1000);
    if (remaining <= 0) {
      clearInterval(timerInterval);
      timerInterval = null;
      timerValue.textContent = '00:00';
      timerOverlay.classList.remove('ending');
      timerOverlay.classList.add('done');
      triggerBuzz();
    } else if (remaining <= 5) {
      timerOverlay.classList.add('ending');
      timerValue.textContent = formatMS(remaining);
    } else {
      timerValue.textContent = formatMS(remaining);
    }
  }, 250);
}

function updateTimerDisplay() {
  const remaining = Math.ceil((timerEndTime - Date.now()) / 1000);
  timerValue.textContent = formatMS(remaining);
}

function triggerBuzz() {
  // iOS Safari doesn't support Vibration API but we can try
  if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 400]);

  // Audio beep
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const now = ctx.currentTime;
    [0, 0.25, 0.5].forEach(delay => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = 880;
      gain.gain.setValueAtTime(0, now + delay);
      gain.gain.linearRampToValueAtTime(0.3, now + delay + 0.02);
      gain.gain.linearRampToValueAtTime(0, now + delay + 0.18);
      osc.start(now + delay);
      osc.stop(now + delay + 0.2);
    });
  } catch(e) {}
}

timerExtend.addEventListener('click', () => {
  if (timerInterval) {
    // still running → add 30s
    timerEndTime += 30 * 1000;
    timerOverlay.classList.remove('ending', 'done');
    updateTimerDisplay();
  } else {
    // done → restart with 30s
    startRestTimer(30, timerLabel.textContent);
  }
});

timerClose.addEventListener('click', () => {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = null;
  timerOverlay.classList.remove('active', 'ending', 'done');
  document.body.classList.remove('timer-active');
});

// ═══ NAVIGATION ═══
function goHome() {
  document.body.classList.add('view-home');
  document.body.classList.remove('view-session');
  document.body.style.removeProperty('--accent-color');
  document.getElementById('topbar-title').textContent = 'Programme';
  document.getElementById('view-session').classList.remove('active');
  document.getElementById('view-home').classList.add('active');
  window.scrollTo(0, 0);
  // Close timer on navigation back
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = null;
  timerOverlay.classList.remove('active', 'ending', 'done');
  document.body.classList.remove('timer-active');
  history.replaceState({ view: 'home' }, '');
}

document.getElementById('btn-back').addEventListener('click', goHome);

// iOS swipe-back protection
window.addEventListener('popstate', e => {
  if (document.body.classList.contains('view-session')) {
    goHome();
  }
});

// ═══ HELPERS ═══
function escape(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ═══ THEME ═══
const themeBtn = document.getElementById('btn-theme');
function setTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  themeBtn.textContent = t === 'dark' ? '☾' : '☀';
  try { localStorage.setItem('theme', t); } catch(e) {}
  // Update status bar meta
  const meta = document.querySelector('meta[name="theme-color"]');
  if (meta) meta.setAttribute('content', t === 'dark' ? '#0a0a0a' : '#f5f4f1');
}
themeBtn.addEventListener('click', () => {
  const current = document.documentElement.getAttribute('data-theme') || 'dark';
  setTheme(current === 'dark' ? 'light' : 'dark');
});
// Restore saved theme
try {
  const saved = localStorage.getItem('theme');
  if (saved) setTheme(saved);
  else setTheme('dark');
} catch(e) { setTheme('dark'); }

// ═══ INIT ═══
renderHome();
</script>
